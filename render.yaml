services:
  - type: web
    name: invoiceagent-api
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: SERVE_FRONTEND
        value: "false"
      - key: COOKIE_SECURE
        value: "true"
      - key: REQUIRE_AUTH
        value: "true"
      - key: ALLOWED_EMAIL_DOMAIN
        value: fifthspace.com
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
        optional: true
