# One Render web service serves BOTH the API and the website at a single URL.
# Deploy: Render dashboard → New → Blueprint (or Web Service → Public Git Repository →
# https://github.com/r5sp/invoiceagent). Render auto-detects the Dockerfile.
services:
  - type: web
    name: invoiceagent
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong secret — never the placeholder
      - key: SERVE_FRONTEND
        value: "true"                # single service serves the built frontend + /api
      - key: REQUIRE_AUTH
        value: "true"                # MUST be true — the @fifthspace.com lock depends on it
      - key: ALLOWED_EMAIL_DOMAIN
        value: fifthspace.com
      - key: COOKIE_SECURE
        value: "true"                # Render serves over HTTPS
      - key: OPENAI_API_KEY
        sync: false                  # paste your OpenAI key in the dashboard (recommended)
      # --- Optional: persist data across redeploys (default is SQLite, which resets on redeploy) ---
      # Uncomment the databases block below AND this var to use a managed Postgres instead:
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: invoiceagent-db
      #     property: connectionString

# databases:
